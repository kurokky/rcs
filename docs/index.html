<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ルービックキューブ カラーゲーム</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  background: #0f0f13; color: #f0f0f0;
  min-height: 100vh;
}

/* ══════════════════════════════
   START PAGE
══════════════════════════════ */
#page-start {
  display: flex; flex-direction: column; align-items: center;
  padding: 36px 20px 28px; min-height: 100vh;
}
#page-start h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; text-align: center; }
.subtitle { font-size: 12px; color: #555; margin-bottom: 24px; text-align: center; }

/* small camera preview */
#start-cam-wrap {
  position: relative; width: 200px; height: 200px;
  border-radius: 16px; overflow: hidden;
  background: #111; border: 2px solid #2a2a36; margin-bottom: 12px;
}
#start-video { width:100%; height:100%; object-fit:cover; display:none; }
#start-cam-placeholder {
  width:100%; height:100%; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:8px; color:#444; font-size:12px;
}
#start-cam-placeholder svg { opacity:0.35; }
#btn-cam-switch-start {
  position:absolute; bottom:8px; right:8px;
  width:34px; height:34px; border-radius:50%; border:none;
  background:rgba(0,0,0,0.6); color:#fff;
  display:none; align-items:center; justify-content:center;
  cursor:pointer; backdrop-filter:blur(4px);
}
#btn-cam-switch-start:active { transform:scale(0.9); }
#btn-cam-switch-start.spinning svg { animation:camSpin 0.35s ease; }
@keyframes camSpin { from{transform:rotate(0)} to{transform:rotate(180deg)} }

#start-cam-status { font-size:12px; color:#666; margin-bottom:20px; text-align:center; min-height:18px; }

.start-rules { font-size:12px; color:#555; line-height:1.8; text-align:center; margin-bottom:22px; }

.time-label { font-size:12px; color:#777; margin-bottom:10px; }
.time-btns  { display:flex; gap:10px; }
.btn-time {
  background:#1e1e2e; color:#c4b5fd; border:1.5px solid #4f46e5;
  font-size:15px; font-weight:700; padding:12px 16px;
  border-radius:10px; cursor:pointer; font-family:inherit;
  transition:background 0.15s, transform 0.1s; min-width:86px;
}
.btn-time:active { transform:scale(0.96); }
.btn-time:disabled { opacity:0.3; cursor:not-allowed; }

/* ══════════════════════════════
   GAME PAGE
══════════════════════════════ */
#page-game {
  display:none; flex-direction:column; align-items:center;
  padding:10px 12px 16px; max-width:480px; margin:0 auto;
}
#page-game.active { display:flex; }

/* HUD */
#hud {
  width:100%; display:flex; justify-content:space-between; align-items:center;
  padding:8px 12px; background:#1a1a22; border-radius:10px;
  margin-bottom:8px; border:1px solid #2a2a36;
}
.hud-item { text-align:center; }
.hud-label { font-size:10px; color:#666; text-transform:uppercase; letter-spacing:.06em; }
.hud-value { font-size:20px; font-weight:700; color:#fff; line-height:1.2; }
#hud-timer.warn { color:#ff5f5f; }
#hud-timer.ok   { color:#4ade80; }
#btn-reset {
  font-size:12px; padding:5px 12px; border-radius:6px;
  border:1px solid #444; background:transparent; color:#666;
  cursor:pointer; font-family:inherit;
}

/* Camera */
#video-container {
  position:relative; width:100%; aspect-ratio:1;
  border-radius:14px; overflow:hidden; background:#111; border:2px solid #2a2a36;
}
#video { width:100%; height:100%; object-fit:cover; display:block; }
#overlay { position:absolute; inset:0; pointer-events:none; }
#flash { position:absolute; inset:0; border-radius:12px; pointer-events:none; opacity:0; }
#flash.ok-flash { background:rgba(74,222,128,0.45); opacity:1; animation:flashOk 0.6s ease forwards; }
#flash.ng-flash { background:rgba(255,80,80,0.45);  opacity:1; animation:flashNg 0.5s ease forwards; }
@keyframes flashOk { 0%{opacity:1;transform:scale(1)} 40%{opacity:.7;transform:scale(1.03)} 100%{opacity:0;transform:scale(1)} }
@keyframes flashNg { 0%,100%{opacity:0;transform:translateX(0)} 15%{opacity:1;transform:translateX(-8px)} 30%{opacity:1;transform:translateX(8px)} 45%{opacity:1;transform:translateX(-6px)} 60%{opacity:1;transform:translateX(6px)} 80%{opacity:.5;transform:translateX(0)} }
@keyframes gridOkBurst { 0%{transform:scale(1);filter:brightness(1)} 30%{transform:scale(1.06);filter:brightness(1.5) saturate(1.8)} 100%{transform:scale(1);filter:brightness(1)} }
@keyframes gridNgShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
@keyframes borderGlowOk { 0%,100%{box-shadow:none} 40%{box-shadow:0 0 0 4px rgba(74,222,128,0.7)} }
@keyframes borderGlowNg { 0%,100%{box-shadow:none} 40%{box-shadow:0 0 0 4px rgba(255,80,80,0.7)} }
#video-container.glow-ok { animation:borderGlowOk 0.6s ease; }
#video-container.glow-ng { animation:borderGlowNg 0.5s ease; }

#btn-cam-switch {
  position:absolute; bottom:10px; right:10px;
  width:40px; height:40px; border-radius:50%; border:none;
  background:rgba(0,0,0,0.5); color:#fff;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; backdrop-filter:blur(4px); z-index:10;
  transition:background 0.15s;
}
#btn-cam-switch:active { transform:scale(0.92); }
#btn-cam-switch.spinning svg { animation:camSpin 0.35s ease; }

/* Quest */
#quest-area { width:100%; display:flex; gap:8px; margin:8px 0 4px; align-items:stretch; }
#quest-card {
  flex:1; padding:12px 14px; background:#1a1a22; border-radius:12px;
  border:1px solid #2a2a36; display:flex; flex-direction:column; justify-content:center; min-height:90px;
}
#quest-badge  { font-size:10px; color:#666; letter-spacing:.08em; margin-bottom:6px; }
#quest-main   { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.q-swatch     { width:28px; height:28px; border-radius:6px; border:2px solid rgba(255,255,255,0.2); flex-shrink:0; }
.q-color-name { font-size:22px; font-weight:800; line-height:1; }
.q-wo         { font-size:16px; color:#666; }
.q-count      { font-size:28px; font-weight:800; color:#facc15; line-height:1; }
.q-ko         { font-size:16px; color:#aaa; }
#quest-sub    { font-size:11px; color:#60a5fa; margin-top:5px; }

#next-quest-card {
  width:82px; padding:8px; background:#13131a; border-radius:10px;
  border:1px solid #222230; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:4px;
}
#next-label  { font-size:9px; color:#444; letter-spacing:.08em; text-transform:uppercase; }
.next-swatch { width:20px; height:20px; border-radius:4px; border:2px solid rgba(255,255,255,0.12); }
.next-cname  { font-size:12px; font-weight:700; color:#666; }
.next-cnt    { font-size:18px; font-weight:800; color:#555; line-height:1; }
.next-ko     { font-size:10px; color:#444; }

/* Feedback */
#feedback {
  text-align:center; font-size:28px; font-weight:800;
  margin:4px 0; height:38px; line-height:38px; letter-spacing:.04em;
  transition:opacity 0.3s; width:100%;
}
#feedback.ng  { color:#ff5f5f; }
#feedback.ok  { color:#4ade80; }
#feedback.hidden { opacity:0; }
@keyframes feedbackPop { 0%{transform:scale(.7);opacity:0} 60%{transform:scale(1.12);opacity:1} 100%{transform:scale(1);opacity:1} }
#feedback.ok, #feedback.ng { animation:feedbackPop 0.3s cubic-bezier(0.22,1,0.36,1); }

/* Grid */
#grid-wrap { display:flex; align-items:center; gap:10px; margin:4px 0; width:100%; }
#grid-display { display:grid; grid-template-columns:repeat(3,32px); gap:4px; flex-shrink:0; }
#grid-display.anim-ok { animation:gridOkBurst 0.6s ease; }
#grid-display.anim-ng { animation:gridNgShake 0.45s ease; }
#grid-display.cooldown { opacity:.55; pointer-events:none; }
.cell { width:32px; height:32px; border-radius:5px; border:2px solid rgba(0,0,0,.2); background:#333; position:relative; transition:background .1s; }
.cell.highlight { border-color:rgba(255,255,255,.8); box-shadow:0 0 0 2px rgba(255,255,255,.35); }
.cell-label { position:absolute; bottom:1px; right:2px; font-size:8px; font-weight:700; color:rgba(255,255,255,.9); text-shadow:0 1px 2px rgba(0,0,0,.9); }
#color-count { font-size:12px; color:#888; line-height:1.6; flex:1; }

/* Countdown overlay */
#screen-countdown {
  display:none; position:fixed; inset:0; background:rgba(15,15,19,.92);
  z-index:200; flex-direction:column; align-items:center; justify-content:center;
}
#screen-countdown.active { display:flex; }
#countdown-num { font-size:96px; font-weight:800; color:#fff; }
@keyframes pop { from{transform:scale(1.4);opacity:0} to{transform:scale(1);opacity:1} }
@keyframes questSlideIn { from{opacity:0;transform:translateY(-10px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
#quest-card.new-quest { animation:questSlideIn 0.35s cubic-bezier(0.22,1,0.36,1); }

/* Result overlay */
#screen-result {
  display:none; position:fixed; inset:0; background:#0f0f13; z-index:200;
  flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:24px;
}
#screen-result.active { display:flex; }
#result-title { font-size:28px; font-weight:800; margin-bottom:16px; }
#result-stats { width:100%; max-width:280px; margin-bottom:20px; }
.result-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #2a2a36; font-size:15px; }
.result-row span:last-child { font-weight:700; color:#facc15; }
.result-time-btns { display:flex; gap:10px; margin-top:8px; }

/* Debug */
#debug-toggle { font-size:10px; color:#333; text-align:right; cursor:pointer; margin-top:8px; width:100%; }
#debug-panel { display:none; margin-top:6px; background:#1a1a1a; color:#aaa; border-radius:8px; padding:10px; font-family:'Menlo',monospace; font-size:10px; line-height:1.7; width:100%; }
#debug-panel.visible { display:block; }
.debug-row { display:flex; justify-content:space-between; gap:8px; }
.dswatch { display:inline-block; width:10px; height:10px; border-radius:2px; vertical-align:middle; margin-right:3px; }

canvas { display:none; }
</style>
</head>
<body>

<!-- ══════════════════════════════
     START PAGE
══════════════════════════════ -->
<div id="page-start">
  <h1>🎲 ルービックカラーゲーム</h1>
  <p class="subtitle">キューブの色を枠に合わせよう！</p>

  <div id="start-cam-wrap">
    <div id="start-cam-placeholder">
      <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <span id="start-cam-status">カメラを起動中…</span>
    </div>
    <video id="start-video" autoplay playsinline muted></video>
    <button id="btn-cam-switch-start" title="カメラ切替">
      <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
    </button>
  </div>

  <p class="start-rules">
    5もんに1ど「1こ以上」ボーなす もんだいあり<br>
    10もんクリアで じょうきゅうモード！
  </p>

  <p class="time-label">じかんをえらんでね</p>
  <div class="time-btns">
    <button class="btn-time" data-sec="60"  disabled>60びょう</button>
    <button class="btn-time" data-sec="120" disabled>120びょう</button>
    <button class="btn-time" data-sec="180" disabled>180びょう</button>
  </div>
</div>

<!-- ══════════════════════════════
     GAME PAGE
══════════════════════════════ -->
<div id="page-game">
  <div id="hud">
    <div class="hud-item">
      <div class="hud-label">残り時間</div>
      <div class="hud-value" id="hud-timer">—</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">クリア</div>
      <div class="hud-value" id="hud-score">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">問題</div>
      <div class="hud-value" id="hud-q">—</div>
    </div>
    <button id="btn-reset">リセット</button>
  </div>

  <div id="video-container">
    <video id="video" autoplay playsinline muted></video>
    <svg id="overlay" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
      <rect x="60"  y="60"  width="60" height="60" fill="none" stroke="white" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
      <rect x="120" y="60"  width="60" height="60" fill="none" stroke="white" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
      <rect x="180" y="60"  width="60" height="60" fill="none" stroke="white" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
      <rect x="60"  y="120" width="60" height="60" fill="none" stroke="white" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
      <rect x="120" y="120" width="60" height="60" fill="none" stroke="white" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
      <rect x="180" y="120" width="60" height="60" fill="none" stroke="white" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
      <rect x="60"  y="180" width="60" height="60" fill="none" stroke="white" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
      <rect x="120" y="180" width="60" height="60" fill="none" stroke="white" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
      <rect x="180" y="180" width="60" height="60" fill="none" stroke="white" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
      <rect x="58" y="58" width="184" height="184" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" rx="4"/>
    </svg>
    <div id="flash"></div>
    <button id="btn-cam-switch" title="カメラ切替">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
    </button>
  </div>

  <div id="quest-area">
    <div id="quest-card">
      <div id="quest-badge">—</div>
      <div id="quest-main"><span style="font-size:14px;color:#555;">じゅんびちゅう</span></div>
      <div id="quest-sub"></div>
    </div>
    <div id="next-quest-card">
      <div id="next-label">NEXT</div>
      <div class="next-swatch" id="next-swatch" style="background:#333"></div>
      <div class="next-cname" id="next-cname">—</div>
      <div class="next-cnt"   id="next-cnt">—</div>
      <div class="next-ko"    id="next-ko"></div>
    </div>
  </div>

  <div id="feedback" class="hidden"></div>

  <div id="grid-wrap">
    <div id="grid-display">
      <div class="cell" id="c0"><span class="cell-label"></span></div>
      <div class="cell" id="c1"><span class="cell-label"></span></div>
      <div class="cell" id="c2"><span class="cell-label"></span></div>
      <div class="cell" id="c3"><span class="cell-label"></span></div>
      <div class="cell" id="c4"><span class="cell-label"></span></div>
      <div class="cell" id="c5"><span class="cell-label"></span></div>
      <div class="cell" id="c6"><span class="cell-label"></span></div>
      <div class="cell" id="c7"><span class="cell-label"></span></div>
      <div class="cell" id="c8"><span class="cell-label"></span></div>
    </div>
    <div id="color-count"></div>
  </div>

  <div id="debug-toggle">▸ debug</div>
  <div id="debug-panel"><div id="debug-content">—</div></div>
</div>

<!-- Countdown overlay -->
<div id="screen-countdown"><div id="countdown-num">3</div></div>

<!-- Result overlay -->
<div id="screen-result">
  <div id="result-title">⏱ タイムアップ！</div>
  <div id="result-stats"></div>
  <p style="font-size:13px;color:#666;margin-bottom:12px;">もう一度あそぶ？じかんをえらんでね</p>
  <div class="result-time-btns">
    <button class="btn-time" data-sec="60">60びょう</button>
    <button class="btn-time" data-sec="120">120びょう</button>
    <button class="btn-time" data-sec="180">180びょう</button>
  </div>
</div>

<canvas id="capture-canvas"></canvas>

<script>
// ══════════════════════════════════════════════
//  SOUND ENGINE
// ══════════════════════════════════════════════
let audioCtx = null;
function getAudioCtx(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playTone(freq,type,startTime,duration,gainVal=0.3){
  const ctx=getAudioCtx(), osc=ctx.createOscillator(), gain=ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type=type; osc.frequency.setValueAtTime(freq,startTime);
  gain.gain.setValueAtTime(gainVal,startTime);
  gain.gain.exponentialRampToValueAtTime(0.001,startTime+duration);
  osc.start(startTime); osc.stop(startTime+duration);
}
function soundOk(){ const ctx=getAudioCtx(),t=ctx.currentTime; playTone(523,'sine',t,0.18,0.35); playTone(659,'sine',t+0.08,0.22,0.35); playTone(784,'triangle',t+0.15,0.28,0.28); }
function soundNg(){ const ctx=getAudioCtx(),t=ctx.currentTime; playTone(200,'sawtooth',t,0.08,0.25); playTone(140,'square',t+0.07,0.22,0.22); }
function soundTick(){ const ctx=getAudioCtx(),t=ctx.currentTime; playTone(880,'sine',t,0.08,0.18); }
function soundGo(){ const ctx=getAudioCtx(),t=ctx.currentTime; playTone(523,'sine',t,0.12,0.3); playTone(659,'sine',t+0.1,0.12,0.3); playTone(1047,'sine',t+0.2,0.25,0.4); }
function soundTimeUp(){ const ctx=getAudioCtx(),t=ctx.currentTime; playTone(440,'sine',t,0.3,0.4); playTone(349,'sine',t+0.28,0.3,0.4); playTone(262,'sine',t+0.56,0.6,0.45); playTone(131,'triangle',t+0.56,0.8,0.2); }

// ══════════════════════════════════════════════
//  COLOR ENGINE
// ══════════════════════════════════════════════
const CUBE_COLORS = [
  { name:'W', label:'しろ',   r:255,g:255,b:255, hex:'#FFFFFF' },
  { name:'Y', label:'きいろ', r:255,g:213,b:0,   hex:'#FFD500' },
  { name:'O', label:'オレンジ',r:255,g:88, b:0,  hex:'#FF5800' },
  { name:'R', label:'あか',   r:196,g:30, b:58,  hex:'#C41E3A' },
  { name:'B', label:'あお',   r:0,  g:70, b:173, hex:'#0046AD' },
  { name:'G', label:'みどり', r:0,  g:155,b:72,  hex:'#009B48' },
];
const COLOR_NAMES = ['しろ','きいろ','オレンジ','あか','あお','みどり'];
const COLOR_KEYS  = ['W','Y','O','R','B','G'];
const COLOR_HEX   = ['#FFFFFF','#FFD500','#FF5800','#C41E3A','#0046AD','#009B48'];
const CUBE_REF    = [{r:255,g:255,b:255},{r:255,g:213,b:0},{r:255,g:88,b:0},{r:196,g:30,b:58},{r:0,g:70,b:173},{r:0,g:155,b:72}];

function rgbDist(r1,g1,b1,r2,g2,b2){ const dr=r1-r2,dg=g1-g2,db=b1-b2; return dr*dr+dg*dg+db*db; }
function rgbToHsv(r,g,b){
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;
  let h=0,s=max===0?0:d/max,v=max;
  if(max!==min){ switch(max){ case r:h=((g-b)/d+(g<b?6:0))/6;break; case g:h=((b-r)/d+2)/6;break; case b:h=((r-g)/d+4)/6;break; } }
  return {h:h*360,s,v};
}
function classifyColor(r,g,b){
  const {h,s,v}=rgbToHsv(r,g,b);
  if(v>0.72&&s<0.22) return CUBE_COLORS[0];
  if(s<0.25){ let best=CUBE_COLORS[0],bestD=Infinity; for(const c of CUBE_COLORS){ const d=rgbDist(r,g,b,c.r,c.g,c.b); if(d<bestD){bestD=d;best=c;} } return best; }
  if(h>=195&&h<=260) return CUBE_COLORS[4];
  if(h>=80&&h<=165)  return CUBE_COLORS[5];
  if(h>=38&&h<=80)   return CUBE_COLORS[1];
  if(h>300||h<=37){
    if(h>=14&&h<=37&&r>100&&g>40){ if(g/(r+1)>0.18) return CUBE_COLORS[2]; }
    return CUBE_COLORS[3];
  }
  let best=CUBE_COLORS[0],bestD=Infinity;
  for(const c of CUBE_COLORS){ const d=rgbDist(r,g,b,c.r,c.g,c.b); if(d<bestD){bestD=d;best=c;} }
  return best;
}
function sampleCell(imgData,cw,ch,col,row){
  const cropX=(cw-ch)/2,side=ch,oL=0.20,oT=0.20,oW=0.60,oH=0.60,cW=oW/3,cH=oH/3,pad=0.035;
  const nx0=oL+col*cW+pad,ny0=oT+row*cH+pad,nx1=oL+(col+1)*cW-pad,ny1=oT+(row+1)*cH-pad;
  const x0=Math.floor(cropX+nx0*side),y0=Math.floor(ny0*side),x1=Math.floor(cropX+nx1*side),y1=Math.floor(ny1*side);
  let rS=0,gS=0,bS=0,cnt=0;
  for(let y=y0;y<y1;y+=3) for(let x=x0;x<x1;x+=3){ const i=(y*cw+x)*4; rS+=imgData.data[i]; gS+=imgData.data[i+1]; bS+=imgData.data[i+2]; cnt++; }
  if(!cnt) return {r:128,g:128,b:128};
  return {r:Math.round(rS/cnt),g:Math.round(gS/cnt),b:Math.round(bS/cnt)};
}

const video      = document.getElementById('video');
const capCanvas  = document.getElementById('capture-canvas');
const capCtx     = capCanvas.getContext('2d');

function detectColors(){
  if(video.readyState<2) return null;
  const vw=video.videoWidth||640,vh=video.videoHeight||480;
  capCanvas.width=vw; capCanvas.height=vh;
  capCtx.drawImage(video,0,0,vw,vh);
  const imgData=capCtx.getImageData(0,0,vw,vh);
  const res=[];
  for(let row=0;row<3;row++) for(let col=0;col<3;col++){
    const rgb=sampleCell(imgData,vw,vh,col,row);
    res.push({...classifyColor(rgb.r,rgb.g,rgb.b),rgb});
  }
  return {colors:res,imgData,vw,vh};
}

function samplePixel(imgData,cw,rawX,rawY){
  const x=Math.max(0,Math.min(cw-1,Math.round(rawX))),y=Math.max(0,Math.min(imgData.height-1,Math.round(rawY)));
  const i=(y*cw+x)*4; return {r:imgData.data[i],g:imgData.data[i+1],b:imgData.data[i+2]};
}
function isRubiksColor(rgb){ return Math.sqrt(Math.min(...CUBE_REF.map(c=>rgbDist(rgb.r,rgb.g,rgb.b,c.r,c.g,c.b))))<95; }
function isCubeVisible(imgData,cw,ch,detectedColors){
  const cropX=(cw-ch)/2,side=ch,oL=0.20,oT=0.20,oW=0.60,oH=0.60;
  let matchCount=0;
  for(let row=0;row<3;row++) for(let col=0;col<3;col++){
    const px=samplePixel(imgData,cw,cropX+(oL+(col+0.5)*(oW/3))*side,(oT+(row+0.5)*(oH/3))*side);
    if(isRubiksColor(px)) matchCount++;
  }
  if(matchCount<6) return false;
  const freq={}; for(const c of detectedColors) freq[c.name]=(freq[c.name]||0)+1;
  return Object.keys(freq).length>=2;
}

// ══════════════════════════════════════════════
//  QUEST GENERATOR
// ══════════════════════════════════════════════
function randInt(a,b){ return a+Math.floor(Math.random()*(b-a+1)); }
function randColor(){ return randInt(0,5); }
function makeQuest(qn){
  if(qn%5===0){ const ci=randColor(); return {type:'range',colorIdx:ci,colorName:COLOR_NAMES[ci],colorKey:COLOR_KEYS[ci],colorHex:COLOR_HEX[ci],min:1,max:9,countDisplay:'1〜9',sub:'1こ以上あればOK！ボーなす もんだい'}; }
  const isHard=qn>10,hardBig=isHard&&qn%10===0,ci=randColor();
  const count=hardBig?5:isHard?randInt(2,5):randInt(1,3);
  return {type:'exact',colorIdx:ci,colorName:COLOR_NAMES[ci],colorKey:COLOR_KEYS[ci],colorHex:COLOR_HEX[ci],count,countDisplay:String(count),sub:isHard?'🔥 じょうきゅう もんだい':''};
}
function checkQuest(quest,colors){
  const cnt=colors.filter(c=>c.name===quest.colorKey).length;
  if(quest.type==='exact') return cnt===quest.count;
  if(quest.type==='range') return cnt>=quest.min&&cnt<=quest.max;
  return false;
}

// ══════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════
let GAME_DURATION=180, state='idle', score=0, questionNum=0;
let currentQuest=null, nextQuest_=null, timeLeft=180, timerInterval=null, animFrame=null, lastColors=null;
let okCooldown=false, ngCooldown=false, hardQuestSolved=false, hardQuestTotal=0;
let stableOkFrames=0, stableNgFrames=0;
const STABLE_FRAMES_NEEDED=8, STABLE_NG_NEEDED=10;

// DOM refs
const hudTimer     = document.getElementById('hud-timer');
const hudScore     = document.getElementById('hud-score');
const hudQ         = document.getElementById('hud-q');
const questCard    = document.getElementById('quest-card');
const questBadge   = document.getElementById('quest-badge');
const questMain    = document.getElementById('quest-main');
const questSub     = document.getElementById('quest-sub');
const feedbackEl   = document.getElementById('feedback');
const colorCount   = document.getElementById('color-count');
const flashEl      = document.getElementById('flash');
const btnReset     = document.getElementById('btn-reset');
const debugToggle  = document.getElementById('debug-toggle');
const debugPanel   = document.getElementById('debug-panel');
const debugContent = document.getElementById('debug-content');
const nextSwatch   = document.getElementById('next-swatch');
const nextCname    = document.getElementById('next-cname');
const nextCnt      = document.getElementById('next-cnt');
const nextKo       = document.getElementById('next-ko');
const screenCountdown = document.getElementById('screen-countdown');
const screenResult    = document.getElementById('screen-result');
const countdownNum    = document.getElementById('countdown-num');
const pageStart    = document.getElementById('page-start');
const pageGame     = document.getElementById('page-game');
const videoContainer = document.getElementById('video-container');
const gridDisplay    = document.getElementById('grid-display');

function formatTime(s){ const m=Math.floor(s/60),sec=s%60; return `${m}:${sec.toString().padStart(2,'0')}`; }

function startTimer(){
  timeLeft=GAME_DURATION; hudTimer.textContent=formatTime(timeLeft); hudTimer.className='hud-value';
  timerInterval=setInterval(()=>{
    timeLeft--;
    hudTimer.textContent=formatTime(timeLeft);
    if(timeLeft<=10){ hudTimer.className='hud-value warn'; soundTick(); }
    else if(timeLeft<=30) hudTimer.className='hud-value warn';
    else hudTimer.className='hud-value ok';
    if(timeLeft<=0){ clearInterval(timerInterval); endGame(); }
  },1000);
}

function renderQuestCard(quest,qNum){
  questBadge.textContent=quest.type==='range'?'★ ボーなす もんだい':(qNum>10?'🔥 じょうきゅう':'📋 もんだい');
  questMain.innerHTML=`<span class="q-swatch" style="background:${quest.colorHex}"></span><span class="q-color-name" style="color:${quest.colorHex==='#FFFFFF'?'#ddd':quest.colorHex}">${quest.colorName}</span><span class="q-wo">を</span><span class="q-count">${quest.countDisplay}</span><span class="q-ko">こ</span>`;
  questSub.textContent=quest.sub||''; hudQ.textContent=qNum;
}
function renderNextCard(quest){
  if(!quest){ nextSwatch.style.background='#333'; nextCname.textContent='—'; nextCnt.textContent=''; nextKo.textContent=''; return; }
  nextSwatch.style.background=quest.colorHex; nextCname.textContent=quest.colorName; nextCnt.textContent=quest.countDisplay; nextKo.textContent='こ';
}
function advanceQuest(){
  questionNum++; currentQuest=nextQuest_||makeQuest(questionNum); nextQuest_=makeQuest(questionNum+1);
  renderQuestCard(currentQuest,questionNum); renderNextCard(nextQuest_);
  okCooldown=false; ngCooldown=false; stableOkFrames=0; stableNgFrames=0;
  feedbackEl.className='hidden'; feedbackEl.textContent='';
  questCard.classList.remove('new-quest'); void questCard.offsetWidth; questCard.classList.add('new-quest');
}

function triggerEffect(type){
  flashEl.className=''; void flashEl.offsetWidth; flashEl.className=type+'-flash';
  setTimeout(()=>{ flashEl.className=''; },700);
  gridDisplay.classList.remove('anim-ok','anim-ng'); void gridDisplay.offsetWidth; gridDisplay.classList.add('anim-'+type);
  setTimeout(()=>{ gridDisplay.classList.remove('anim-ok','anim-ng'); },700);
  videoContainer.classList.remove('glow-ok','glow-ng'); void videoContainer.offsetWidth; videoContainer.classList.add('glow-'+type);
  setTimeout(()=>{ videoContainer.classList.remove('glow-ok','glow-ng'); },700);
}

let feedbackTimeout=null;
function showFeedback(msg,type,permanent){
  clearTimeout(feedbackTimeout); feedbackEl.textContent=msg; feedbackEl.className=type;
  if(!permanent) feedbackTimeout=setTimeout(()=>{ feedbackEl.className='hidden'; feedbackEl.textContent=''; },1200);
}

function gameLoop(){
  const detected=detectColors();
  if(detected){
    const {colors,imgData,vw,vh}=detected; lastColors=colors;
    const cubeVisible=(state==='playing'&&currentQuest&&!okCooldown)?isCubeVisible(imgData,vw,vh,colors):undefined;
    updateGrid(colors); updateDebug(colors,vw,vh,cubeVisible);
    if(state==='playing'&&currentQuest&&!okCooldown){
      if(!cubeVisible){ stableOkFrames=0; stableNgFrames=0; if(!ngCooldown) feedbackEl.className='hidden'; animFrame=requestAnimationFrame(gameLoop); return; }
      const passed=checkQuest(currentQuest,colors);
      if(passed){ stableOkFrames++; stableNgFrames=0; if(stableOkFrames>=STABLE_FRAMES_NEEDED) onCorrect(); }
      else{
        stableOkFrames=0;
        const cnt=colors.filter(c=>c.name===currentQuest.colorKey).length;
        if(currentQuest.type==='exact'){
          stableNgFrames++;
          if(stableNgFrames>=STABLE_NG_NEEDED&&!ngCooldown){ stableNgFrames=0; ngCooldown=true; soundNg(); triggerEffect('ng'); showFeedback(`NG — ${currentQuest.colorName} が ${cnt}こ`,'ng',false); setTimeout(()=>{ ngCooldown=false; },1400); }
        } else { stableNgFrames=0; feedbackEl.className='hidden'; }
      }
    }
  }
  animFrame=requestAnimationFrame(gameLoop);
}

function onCorrect(){
  okCooldown=true; stableOkFrames=0; score++; hudScore.textContent=score;
  if(currentQuest.type==='exact'&&currentQuest.count>=5){ hardQuestSolved=true; hardQuestTotal++; }
  soundOk(); triggerEffect('ok'); showFeedback('✓ クリア！','ok',true); gridDisplay.classList.add('cooldown');
  setTimeout(()=>{ gridDisplay.classList.remove('cooldown'); advanceQuest(); },2000);
}

function updateGrid(colors){
  const targetKey=currentQuest?currentQuest.colorKey:null;
  colors.forEach((c,i)=>{ const el=document.getElementById('c'+i); if(!el) return; el.style.background=c.hex; el.querySelector('.cell-label').textContent=c.label; el.className='cell'+(targetKey&&c.name===targetKey?' highlight':''); });
  if(targetKey&&colors){ const cnt=colors.filter(c=>c.name===targetKey).length,cname=CUBE_COLORS.find(c=>c.name===targetKey)?.label||''; colorCount.innerHTML=`<span style="font-size:13px;color:#aaa;">${cname}：</span><span style="font-size:16px;font-weight:700;color:#facc15;">${cnt}</span><span style="font-size:12px;color:#888;">こ</span>`; }
  else colorCount.textContent='';
}

function updateDebug(colors,vw,vh,cubeVisible){
  if(!debugPanel.classList.contains('visible')) return;
  const labels=['左上','上','右上','左','中','右','左下','下','右下'];
  const cX=Math.round(((vw||0)-(vh||0))/2), cubeStr=cubeVisible===undefined?'—':(cubeVisible?'✓ あり':'✗ なし');
  let h=`<div style="color:#555;margin-bottom:4px;">${vw||0}×${vh||0} cropX:±${cX} キューブ:${cubeStr}</div>`;
  h+=colors.map((c,i)=>{ const {r,g,b}=c.rgb; return `<div class="debug-row"><span>${labels[i]}</span><span><span class="dswatch" style="background:rgb(${r},${g},${b})"></span>rgb(${r},${g},${b})</span><span><span class="dswatch" style="background:${c.hex}"></span>${c.label}</span></div>`; }).join('');
  debugContent.innerHTML=h;
}

function endGame(){
  state='result'; cancelAnimationFrame(animFrame); clearInterval(timerInterval); soundTimeUp();
  document.getElementById('result-stats').innerHTML=`<div class="result-row"><span>クリア問題数</span><span>${score} 問</span></div><div class="result-row"><span>最終問題番号</span><span>${questionNum} 問目</span></div><div class="result-row"><span>上級問題クリア</span><span>${hardQuestSolved?hardQuestTotal+'問 ✓':'なし'}</span></div><div class="result-row"><span>モード</span><span>${questionNum>10?'🔥 上級突入':'通常'}</span></div>`;
  const titleEl=document.getElementById('result-title');
  if(score>=20) titleEl.textContent='🏆 パーフェクト！'; else if(score>=12) titleEl.textContent='🎉 お見事！'; else if(score>=6) titleEl.textContent='👍 よくできました！'; else titleEl.textContent='⏱ タイムアップ！';
  screenResult.classList.add('active');
}

function runCountdown(cb){
  let n=3; countdownNum.textContent=n; soundTick(); screenCountdown.classList.add('active');
  const iv=setInterval(()=>{
    n--;
    if(n===0){ countdownNum.textContent='GO！'; soundGo(); }
    else if(n<0){ clearInterval(iv); screenCountdown.classList.remove('active'); cb(); }
    else{ countdownNum.textContent=n; countdownNum.style.animation='none'; void countdownNum.offsetWidth; countdownNum.style.animation='pop 0.4s ease'; soundTick(); }
  },900);
}

function startGame(duration){
  GAME_DURATION=duration; score=0; questionNum=0; currentQuest=null; nextQuest_=null;
  hardQuestSolved=false; hardQuestTotal=0; stableOkFrames=0; okCooldown=false; ngCooldown=false; stableNgFrames=0;
  hudScore.textContent='0'; hudQ.textContent='—'; hudTimer.textContent=formatTime(GAME_DURATION); hudTimer.className='hud-value ok';
  feedbackEl.className='hidden'; colorCount.textContent='';
  questBadge.textContent='—'; questMain.innerHTML='<span style="font-size:14px;color:#555;">じゅんびちゅう...</span>'; questSub.textContent='';
  renderNextCard(null);
  // ページ切替: スタート→ゲーム
  pageStart.style.display='none'; pageGame.classList.add('active');
  screenResult.classList.remove('active');
  nextQuest_=makeQuest(1); renderNextCard(nextQuest_);
  // ゲーム用videoに同じストリームをセット
  video.srcObject=currentStream; video.play().catch(()=>{});
  cancelAnimationFrame(animFrame);
  runCountdown(()=>{ state='playing'; startTimer(); advanceQuest(); gameLoop(); });
}

function resetGame(){
  cancelAnimationFrame(animFrame); clearInterval(timerInterval); state='idle';
  screenResult.classList.remove('active'); screenCountdown.classList.remove('active');
  pageGame.classList.remove('active'); pageStart.style.display='flex';
  feedbackEl.className='hidden'; colorCount.textContent='';
}

// ── Camera ──
let currentFacingMode='environment', currentStream=null;

async function startCamera(facingMode='environment'){
  if(currentStream){ currentStream.getTracks().forEach(t=>t.stop()); currentStream=null; }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:facingMode},width:{ideal:1280},height:{ideal:720}}});
    currentStream=stream; currentFacingMode=facingMode;
    // スタート画面の小さいプレビューに表示
    const startVid=document.getElementById('start-video');
    startVid.srcObject=stream; startVid.style.display='block';
    document.getElementById('start-cam-placeholder').style.display='none';
    document.getElementById('btn-cam-switch-start').style.display='flex';
    document.getElementById('start-cam-status').textContent='カメラ準備OK！じかんをえらんでスタート';
    // スタートボタンを有効化
    document.querySelectorAll('#page-start .btn-time').forEach(b=>b.disabled=false);
  }catch(err){
    console.error('[RubikGame] Camera error:',err);
    document.getElementById('start-cam-status').textContent='⚠ カメラエラー: '+err.message;
  }
}

// スタート画面のカメラ切替
document.getElementById('btn-cam-switch-start').addEventListener('click',async()=>{
  const btn=document.getElementById('btn-cam-switch-start');
  btn.classList.add('spinning'); setTimeout(()=>btn.classList.remove('spinning'),400);
  await startCamera(currentFacingMode==='environment'?'user':'environment');
});

// ゲーム中のカメラ切替
document.getElementById('btn-cam-switch').addEventListener('click',async()=>{
  const btn=document.getElementById('btn-cam-switch');
  btn.classList.add('spinning'); setTimeout(()=>btn.classList.remove('spinning'),400);
  await startCamera(currentFacingMode==='environment'?'user':'environment');
  video.srcObject=currentStream; video.play().catch(()=>{});
});

// 時間ボタン（スタート画面・リザルト画面共通）
document.querySelectorAll('.btn-time').forEach(btn=>{
  btn.addEventListener('click',()=>{ const sec=parseInt(btn.dataset.sec,10); startGame(sec); });
});
btnReset.addEventListener('click',resetGame);
debugToggle.addEventListener('click',()=>{ const v=debugPanel.classList.toggle('visible'); debugToggle.textContent=(v?'▾':'▸')+' debug'; });

// ページ読み込み時にカメラ起動
startCamera('environment');
</script>
